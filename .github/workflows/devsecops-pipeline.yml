###############################################################
# DOTWEB Enterprise & Business Applications
# DevSecOps CI/CD Security Pipeline - 9 Stages
# Region hardcoded - no longer read from secrets
###############################################################

name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write
  actions: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: dotweb-app

jobs:

  # ============================================================
  # STAGE 1 - SECRETS SCANNING
  # ============================================================
  secrets-scan:
    name: "Stage 1 · Secrets Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Upload secrets scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-results
          path: trufflehog-results.json
          if-no-files-found: ignore

  # ============================================================
  # STAGE 2 - SAST: Bandit + Semgrep
  # ============================================================
  sast-scan:
    name: "Stage 2 · SAST (Bandit + Semgrep)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit[sarif] semgrep

      - name: Run Bandit SAST scan
        run: |
          bandit -r app/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --exit-zero
          bandit -r app/ -f txt | tee bandit-results.txt
          echo "Bandit scan complete"

      - name: Upload Bandit SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/owasp-top-ten \
            --sarif \
            --output=semgrep-results.sarif \
            app/ || true
          echo "Semgrep scan complete"

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload SAST results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: |
            bandit-results.sarif
            bandit-results.txt
            semgrep-results.sarif

  # ============================================================
  # STAGE 3 - SCA: pip-audit
  # ============================================================
  sca-scan:
    name: "Stage 3 · SCA (pip-audit)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run SCA dependency audit
        run: |
          pip-audit \
            -r app/requirements.txt \
            --format=json \
            --output=sca-results.json || true
          cat sca-results.json

      - name: Check for vulnerabilities
        run: |
          python3 -c "
          import json
          with open('sca-results.json') as f:
              data = json.load(f)
          deps = data.get('dependencies', [])
          vulns = [v for d in deps for v in d.get('vulns', [])]
          print(f'Total vulnerabilities found: {len(vulns)}')
          for v in vulns:
              print(f'  - {v.get(\"id\")}: {v.get(\"description\", \"\")[:80]}')
          print('SCA scan complete')
          "

      - name: Upload SCA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: sca-results.json

  # ============================================================
  # STAGE 4 - IaC SECURITY: tfsec
  # ============================================================
  iac-scan:
    name: "Stage 4 · IaC Security (tfsec)"
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          tfsec --version

      - name: Run tfsec and generate SARIF
        run: |
          tfsec terraform/ \
            --format sarif \
            --out tfsec-results.sarif \
            --soft-fail || true
          if [ ! -f tfsec-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > tfsec-results.sarif
          fi
          echo "tfsec scan complete"

      - name: Upload tfsec SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      - name: Upload tfsec results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-scan-results
          path: tfsec-results.sarif

  # ============================================================
  # STAGE 5 - BUILD DOCKER IMAGE
  # ============================================================
  build:
    name: "Stage 5 · Build Docker Image"
    runs-on: ubuntu-latest
    needs: [ sast-scan, sca-scan, iac-scan ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: false
          load: true
          tags: dotweb-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save dotweb-app:${{ github.sha }} -o /tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  # ============================================================
  # STAGE 6 - CONTAINER SCANNING: Trivy
  # ============================================================
  container-scan:
    name: "Stage 6 · Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Run Trivy container scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dotweb-app:${{ github.sha }}
          format: sarif
          output: trivy-container.sarif
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Run Trivy container scan (Table for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dotweb-app:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

      - name: Upload container scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-results
          path: trivy-container.sarif

  # ============================================================
  # STAGE 7 - PUSH TO ECR
  # Region hardcoded — not read from secrets
  # ============================================================
  push-to-ecr:
    name: "Stage 7 · Push to ECR"
    runs-on: ubuntu-latest
    needs: container-scan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Debug — print role ARN length
        run: |
          ARN="${{ secrets.AWS_ROLE_ARN }}"
          echo "ARN length: ${#ARN}"
          echo "ARN starts with: ${ARN:0:20}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHA="${{ github.sha }}"
          docker tag dotweb-app:${SHA} ${ECR_REGISTRY}/${{ env.ECR_REPO }}:${SHA}
          docker tag dotweb-app:${SHA} ${ECR_REGISTRY}/${{ env.ECR_REPO }}:latest
          docker push ${ECR_REGISTRY}/${{ env.ECR_REPO }}:${SHA}
          docker push ${ECR_REGISTRY}/${{ env.ECR_REPO }}:latest
          echo "Image pushed to ECR"

  # ============================================================
  # STAGE 8 - ECR IMAGE SCAN
  # ============================================================
  ecr-scan:
    name: "Stage 8 · ECR Image Scan"
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Wait for ECR scan
        run: |
          echo "Waiting 30s for ECR scan..."
          sleep 30
          aws ecr wait image-scan-complete \
            --repository-name ${{ env.ECR_REPO }} \
            --image-id imageTag=${{ github.sha }} \
            --region us-east-1 || true

      - name: Print ECR scan findings
        run: |
          aws ecr describe-image-scan-findings \
            --repository-name ${{ env.ECR_REPO }} \
            --image-id imageTag=${{ github.sha }} \
            --region us-east-1 \
            --output json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          counts = data.get('imageScanFindings', {}).get('findingSeverityCounts', {})
          print('ECR Scan Summary:')
          for sev, count in counts.items():
              print(f'  {sev}: {count}')
          " || true
          echo "ECR scan complete"

  # ============================================================
  # STAGE 9 - SECURITY REPORT
  # Region hardcoded — not read from secrets
  # ============================================================
  security-report:
    name: "Stage 9 · Security Report"
    runs-on: ubuntu-latest
    needs: [ sast-scan, sca-scan, iac-scan, container-scan ]
    if: always()
    env:
      COMMIT_SHA: ${{ github.sha }}
      REF_NAME: ${{ github.ref_name }}
      RUN_NUMBER: ${{ github.run_number }}
      SECRETS_RESULT: ${{ needs.secrets-scan.result }}
      SAST_RESULT: ${{ needs.sast-scan.result }}
      SCA_RESULT: ${{ needs.sca-scan.result }}
      IAC_RESULT: ${{ needs.iac-scan.result }}
      CONTAINER_RESULT: ${{ needs.container-scan.result }}
    steps:
      - name: Download all security artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Generate consolidated security report
        run: |
          REPORT_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > security-report.md << REPORT
          # DOTWEB DevSecOps Security Pipeline Report
          Run Date: ${REPORT_DATE}
          Commit SHA: ${COMMIT_SHA}
          Branch: ${REF_NAME}
          Pipeline Run: ${RUN_NUMBER}

          ## Pipeline Stages Summary
          | Stage | Tool | Status |
          |-------|------|--------|
          | 1. Secrets Scan | TruffleHog | ${SECRETS_RESULT} |
          | 2. SAST | Bandit + Semgrep | ${SAST_RESULT} |
          | 3. SCA | pip-audit | ${SCA_RESULT} |
          | 4. IaC Scan | tfsec | ${IAC_RESULT} |
          | 5. Build | Docker | see logs |
          | 6. Container Scan | Trivy | ${CONTAINER_RESULT} |
          | 7. Push to ECR | AWS ECR | see logs |
          | 8. ECR Scan | AWS Native | see logs |

          ## Security Tools Used
          - TruffleHog - Secrets and credentials detection
          - Bandit - Python SAST (OWASP Top 10)
          - Semgrep - Multi-language SAST patterns
          - pip-audit - SCA dependency CVE scanning
          - tfsec - Terraform IaC misconfiguration detection
          - Trivy - Container OS and app vulnerability scanning
          - AWS ECR Scan - Cloud-native image scanning
          - Docker Multi-stage - Attack surface reduction

          ---
          Generated by DOTWEB DevSecOps Pipeline - DOTWEB Enterprise and Business Applications
          REPORT
          echo "Report generated"
          cat security-report.md

      - name: Configure AWS credentials for S3 upload
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload report to S3
        if: github.ref == 'refs/heads/main'
        env:
          BUCKET: ${{ secrets.S3_REPORTS_BUCKET }}
          RUN_NUM: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          aws s3 cp security-report.md "s3://${BUCKET}/reports/${RUN_NUM}-${SHA}.md"
          echo "Security report saved to S3"

      - name: Upload report as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 30
